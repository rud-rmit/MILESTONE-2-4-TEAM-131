<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 3 - Crash Severity Predictor</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .tool-content {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .predictor-ui {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: bold;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid currentColor;
            background: transparent;
            color: inherit;
            cursor: pointer;
            width: 220px;
        }

        .operator {
            font-size: 2em;
            font-weight: bold;
        }

        .ring-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .info-btn {
            background: transparent;
            border: 1px solid currentColor;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 15px;
            color: inherit;
        }

        .ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--ring-color, #ddd) var(--percent), #ddd 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .ring::before {
            content: "";
            width: 85%;
            height: 85%;
            border-radius: 50%;
            background: var(--bg-color, #fff);
        }

        .ring-text {
            position: absolute;
            text-align: center;
            font-weight: bold;
            color: var(--ring-color, #000);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            border: 1px solid #ccc;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .dark-mode .modal-content {
            background: #222;
            color: #eee;
            border: 1px solid #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border: 1px solid currentColor;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid currentColor;
        }

        th {
            background: rgba(128, 128, 128, 0.2);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Victorian Road Safety</div>
        <nav>
            <ul>
                <li><a href="1home.html">Home</a></li>
                <li><a href="2about.html">About</a></li>
                <li><a href="3contact.html">Contact</a></li>
                <li><a href="4tools.html">Tools</a></li>

                <li class="dropdown">
                    <button class="icon-btn" id="searchBtn" title="Search Tools">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                    <div class="dropdown-content">
                        <a href="4tools1.html">Accident info by conditions</a>
                        <a href="4tools2.html">Focused view of people and injuries</a>
                        <a href="4tools3.html">Crash Severity Predictor</a>
                        <a href="4tool4.html">Speed Zone Danger Predictor</a>
                    </div>
                </li>

                <li>
                    <button id="darkModeBtn" class="icon-btn" title="Toggle Theme">
                        <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <div class="tool-content">
        <h2>Speed Zone Danger Predictor</h2>
        <div class="predictor-ui">
            <div class="input-group">
                <label>Lighting Condition</label>
                <select id="light-select">
                    <option value="1">Daylight</option>
                    <option value="2">Dusk/Dawn</option>
                    <option value="3">Dark (Streetlights)</option>
                    <option value="4">Dark (No Lighting)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Speed Zone (km/h)</label>
                <select id="speed-select">
                    <option value="30">30 km/h</option>
                    <option value="40">40 km/h</option>
                    <option value="50">50 km/h</option>
                    <option value="60">60 km/h</option>
                    <option value="70">70 km/h</option>
                    <option value="80">80 km/h</option>
                    <option value="90">90 km/h</option>
                    <option value="100">100 km/h</option>
                    <option value="110">100+ km/h</option>
                </select>
            </div>

            <div class="ring-container">
                <div id="risk-ring" class="ring" style="--percent: 10%; --ring-color: #2ecc71;"></div>
                <div class="ring-text">
                    <div id="score-val">10%</div>
                    <div id="severity-val" style="font-size: 0.7em;">SAFE</div>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Condition</th>
                    <th>Speed Zone</th>
                    <th>Danger Level</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>

    <script>
        // --- Persistence Logic ---
        const darkBtn = document.getElementById('darkModeBtn');
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        darkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        // --- Existing Tool Logic ---
        const data = [
            { light: "Dark (No Lighting)", speed: "100+ km/h", risk: "62%" },
            { light: "Dark (No Lighting)", speed: "80 km/h", risk: "58%" },
            { light: "Dusk/Dawn", speed: "100+ km/h", risk: "55%" },
            { light: "Dark (Streetlights)", speed: "90 km/h", risk: "42%" },
            { light: "Daylight", speed: "40 km/h", risk: "18%" }
        ];

        const body = document.getElementById('data-body');
        data.forEach(d => body.innerHTML += `<tr><td>${d.light}</td><td>${d.speed}</td><td>${d.risk}</td></tr>`);

        function update() {
            const light = parseInt(document.getElementById('light-select').value);
            const speed = parseInt(document.getElementById('speed-select').value);

            let score = (speed / 120) * 50 + (light * 12);
            score = Math.min(99, Math.floor(score));

            let color = score > 70 ? "#e74c3c" : score > 40 ? "#e67e22" : "#2ecc71";
            const ring = document.getElementById('risk-ring');
            ring.style.setProperty('--percent', score + '%');
            ring.style.setProperty('--ring-color', color);
            document.getElementById('score-val').innerText = score + '%';
            document.getElementById('score-val').style.color = color;

            document.getElementById('severity-val').innerText = score > 70 ? "HIGH DANGER" : score > 40 ? "CAUTION" : "SAFE";
        }

        document.getElementById('light-select').addEventListener('change', update);
        document.getElementById('speed-select').addEventListener('change', update);
    </script>
</body>

</html>
